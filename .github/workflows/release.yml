name: Build and Release APK

on:
  push:
    tags:
      - 'v*'  # 推送版本标签时触发，如 v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Build native library
        run: |
          NDK_BIN="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          GOOS=android GOARCH=arm64 CGO_ENABLED=1 \
            CC="$NDK_BIN/aarch64-linux-android21-clang" \
            go build -buildmode=c-shared -ldflags="-s" \
            -o android/app/src/main/jniLibs/arm64-v8a/libdnsway.so \
            ./internal/android/
        working-directory: ${{ github.workspace }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ${{ github.workspace }}/android

      - name: Build and sign APK
        run: |
          echo "KEYSTORE_PATH=dnsway-release.jks" >> $GITHUB_ENV
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > dnsway-release.jks
          chmod 600 dnsway-release.jks
          ./gradlew assembleRelease
        working-directory: ${{ github.workspace }}/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             Dnsway-${{ github.ref_name }}.apk
          cp android/app/build/outputs/apk/release/app-release.apk \
             Dnsway.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Dnsway-*.apk
            Dnsway.apk
          generate_release_notes: true
